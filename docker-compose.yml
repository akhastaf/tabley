services:
  postgres:
    image: postgres:16-alpine
    container_name: tabley_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tabley
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5440:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tabley_redis
    restart: unless-stopped
    ports:
      - "6390:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: tabley_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9080:9000"
      - "9081:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: tabley_meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      # Interpolated from .env at the compose level so the api client (which
      # also reads MEILI_MASTER_KEY from .env) always matches the server key.
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKeyDevOnly_changeMe}
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7740:7700"
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot service: runs app migrations + seed + Better Auth schema, then exits.
  # `api` waits on it via depends_on so it never starts before the DB is ready.
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: tabley_migrate
    # Secrets + app config come from .env; the one override below swaps the
    # host-facing DATABASE_URL for the container-internal postgres hostname.
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tabley
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        pnpm --filter @tabley/database build &&
        pnpm db:migrate &&
        pnpm db:seed &&
        cd apps/api && pnpm auth:migrate
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: tabley_api
    restart: unless-stopped
    # All secrets + config (S3, Better Auth, Resend, API keys, etc.) load from
    # .env. The environment block only overrides the host-facing URLs in .env
    # with container-internal hostnames, plus the two model vars not in .env.
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tabley
      REDIS_URL: redis://redis:6379
      MEILI_HOST: http://meilisearch:7700
      S3_ENDPOINT: http://minio:9000
      MENU_INGEST_MODEL: ${MENU_INGEST_MODEL:-gemini-2.5-flash-lite}
      MENU_TRANSLATE_MODEL: ${MENU_TRANSLATE_MODEL:-gemini-2.5-flash-lite}
    ports:
      - "3011:3011"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/database/src:/app/packages/database/src

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: tabley_web
    restart: unless-stopped
    # NODE_ENV + the NEXT_PUBLIC_* browser-facing URLs come from .env. Only the
    # server-side fetch URL is overridden so Next.js SSR inside the container
    # reaches the api container directly (not the browser's localhost).
    env_file:
      - .env
    environment:
      INTERNAL_API_URL: http://api:3011
    ports:
      - "3010:3010"
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
      - ./apps/web/next.config.ts:/app/apps/web/next.config.ts
      - ./apps/web/components.json:/app/apps/web/components.json
      - ./packages/shared/src:/app/packages/shared/src

volumes:
  pgdata:
  redisdata:
  meilidata:
  miniodata:
